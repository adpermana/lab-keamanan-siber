services:
  # ========== SIMPEG (vulnerable-app) ==========
  simpeg-db:
    image: mysql:8.0
    container_name: simpeg-db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: simulasi_keamanan
    volumes:
      - ./apps/vulnerable-app/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10
      interval: 10s
    networks:
      - lab-network
    restart: unless-stopped

  simpeg-web:
    build: ./apps/vulnerable-app
    container_name: simpeg-web
    ports:
      - "8080:80"
    environment:
      DB_HOST: simpeg-db
      DB_USER: root
      DB_PASS: rootpassword
      DB_NAME: simulasi_keamanan
    depends_on:
      simpeg-db:
        condition: service_healthy
    networks:
      - lab-network
    restart: unless-stopped

  simpeg-pma:
    image: phpmyadmin:latest
    container_name: simpeg-phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: simpeg-db
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    depends_on:
      - simpeg-db
    networks:
      - lab-network
    restart: unless-stopped

  # ========== FotorEC v3 ==========
  fotorec-db:
    image: mysql:8.0
    container_name: fotorecv3-db
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: admin1234
      MYSQL_DATABASE: fotorec
    volumes:
      - ./apps/fotorecv3/data.sql:/docker-entrypoint-initdb.d/data.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10
      interval: 10s
    networks:
      - lab-network
    restart: unless-stopped

  fotorec-web:
    build: ./apps/fotorecv3
    container_name: fotorecv3-web
    ports:
      - "8082:80"
    environment:
      DB_HOST: fotorec-db
      DB_USER: root
      DB_PASS: admin1234
      DB_NAME: fotorec
    depends_on:
      fotorec-db:
        condition: service_healthy
    networks:
      - lab-network
    restart: unless-stopped

  fotorec-pma:
    image: phpmyadmin:latest
    container_name: fotorecv3-pma
    ports:
      - "8083:80"
    environment:
      PMA_HOST: fotorec-db
      PMA_USER: root
      PMA_PASSWORD: admin1234
    depends_on:
      - fotorec-db
    networks:
      - lab-network
    restart: unless-stopped

  # ========== SPMB Laravel ==========
  spmb-db:
    image: mysql:8.0
    container_name: spmb-db
    ports:
      - "3309:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: spmb_laravel
    volumes:
      - spmb_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10
      interval: 10s
    networks:
      - lab-network
    restart: unless-stopped

  spmb-web:
    build: ./apps/spmb-laravel
    container_name: spmb-web
    ports:
      - "8085:80"
    environment:
      DB_CONNECTION: mysql
      DB_HOST: spmb-db
      DB_PORT: 3306
      DB_DATABASE: spmb_laravel
      DB_USERNAME: root
      DB_PASSWORD: rootpassword
    depends_on:
      spmb-db:
        condition: service_healthy
    networks:
      - lab-network
    restart: unless-stopped

  spmb-pma:
    image: phpmyadmin:latest
    container_name: spmb-phpmyadmin
    ports:
      - "8086:80"
    environment:
      PMA_HOST: spmb-db
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    depends_on:
      - spmb-db
    networks:
      - lab-network
    restart: unless-stopped

  # ========== Launcher ==========
  launcher:
    build: ./apps/launcher
    container_name: web-launcher
    ports:
      - "8084:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - lab-network
    restart: unless-stopped

volumes:
  spmb_mysql_data:

networks:
  lab-network:
    driver: bridge
